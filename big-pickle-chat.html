<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Big Pickle Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥒</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Pickle">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{--bg:#0f1117;--surface:#1a1d27;--text:#e2e8f0;--sub:#8896b0;--border:#2e3348;--user-bubble:#0d6efd;--bot-bubble:#1e2236;--input-bg:#1a1d27;--shadow:0 4px 20px rgba(0,0,0,.3);font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100%}
body.light{--bg:#f5f7fa;--surface:#fff;--text:#1f2a44;--sub:#6e7b96;--border:#edf2ff;--user-bubble:#0d6efd;--bot-bubble:#f0f4ff;--input-bg:#fff;--shadow:0 4px 20px rgba(0,0,0,.06)}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:10;flex-shrink:0}
#header .logo{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#header .info{flex:1;min-width:0}
#header h1{font-size:17px;font-weight:800}
#header .sub{font-size:11px;color:var(--sub);opacity:.7}
#header .hdr-btns{display:flex;gap:6px}
.hdr-btn{width:38px;height:38px;border:none;border-radius:10px;background:transparent;color:var(--sub);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.hdr-btn:active{background:var(--border)}
#chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.6;animation:fadeIn .25s ease;word-wrap:break-word;white-space:pre-wrap}
.msg.user{background:var(--user-bubble);color:#fff;align-self:flex-end;border-bottom-left-radius:4px}
.msg.bot{background:var(--bot-bubble);color:var(--text);align-self:flex-start;border-bottom-right-radius:4px;border:1px solid var(--border)}
.msg.system{background:transparent;color:var(--sub);font-size:12px;align-self:center;text-align:center;padding:6px 12px}
.msg code{background:rgba(0,0,0,.2);padding:2px 6px;border-radius:6px;font-size:13px;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.msg pre{background:#0a0c12;border:1px solid var(--border);border-radius:12px;padding:12px;overflow-x:auto;margin:8px 0;direction:ltr;text-align:left}
.msg pre code{background:none;padding:0;font-size:13px}
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--sub);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
#input-area{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#input-wrap{flex:1;background:var(--input-bg);border:1.5px solid var(--border);border-radius:14px;padding:4px 12px;display:flex;align-items:center;gap:6px;transition:border-color .2s}
#input-wrap:focus-within{border-color:#22c55e}
#msgInput{border:none;background:none;outline:none;color:var(--text);font-size:15px;font-family:inherit;flex:1;padding:8px 0;max-height:120px;resize:none;line-height:1.5;direction:rtl;text-align:right}
#msgInput::placeholder{color:var(--sub);opacity:.5}
#sendBtn{width:44px;height:44px;border:none;border-radius:14px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s}
#sendBtn:disabled{opacity:.4;cursor:not-allowed}
#sendBtn:active:not(:disabled){transform:scale(.92)}
#apiModal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
#apiModal.show{display:flex}
.modal-card{background:var(--surface);border-radius:20px;padding:24px;width:min(100%,380px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.modal-card p{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.7}
.modal-card label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}
.modal-card input{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:var(--input-bg);color:var(--text);outline:none;direction:ltr;text-align:left}
.modal-card input:focus{border-color:#22c55e}
.modal-card .btn{width:100%;padding:14px;border:none;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;margin-top:16px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2a44;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:99;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@media(max-width:400px){.msg{max-width:92%;font-size:14px}}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0a0c12;border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;direction:rtl}
.code-header span{font-size:11px;color:var(--sub);font-weight:700}
.copy-btn{background:var(--surface);border:none;color:var(--sub);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:700}
</style>
</head>
<body>

<div id="header">
  <div class="logo">🥒</div>
  <div class="info">
    <h1>Big Pickle</h1>
    <div class="sub">open code zen</div>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="toggleTheme()" title="الوضع">🌙</button>
    <button class="hdr-btn" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
    <button class="hdr-btn" onclick="showApiModal()" title="API Key">🔑</button>
  </div>
</div>

<div id="chat">
  <div class="msg system">مرحباً بك في Big Pickle 🥒 اسألني عن أي شيء</div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <button id="sendBtn" onclick="sendMsg()">⬆</button>
    <textarea id="msgInput" rows="1" placeholder="اكتب رسالتك..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<div id="apiModal">
  <div class="modal-card">
    <h2>🔑 مفتاح API</h2>
    <p>ادخل مفتاح API من <strong>opencode.ai/auth</strong><br>المفتاح يحفظ في جهازك فقط ولا يرسل لأي جهة.</p>
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." dir="ltr" style="direction:ltr;text-align:left" autocomplete="off">
    <button class="btn" onclick="saveApiKey()">حفظ</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDaQ7Ur6f7_ugSTy2_u0-gPEtUsFzhh82U",
  authDomain:"kashf-system.firebaseapp.com",
  databaseURL:"https://kashf-system-default-rtdb.firebaseio.com",
  projectId:"kashf-system",
  storageBucket:"kashf-system.firebasestorage.app",
  messagingSenderId:"987561323340",
  appId:"1:987561323340:web:19d72fce8456f2fdf9bde9"
});
const db = getDatabase(app);

const MODEL = "big-pickle";
const STORAGE_KEY = "bp_chat_history";
const KEY_STORAGE = "bp_api_key";

let apiKey = localStorage.getItem(KEY_STORAGE) || "";
let messages = [];
let isSending = false;
let currentRequestKey = null;
let currentListener = null;
let requestTimeout = null;

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const toast = document.getElementById("toast");

loadHistory();
if (!apiKey) {
  setTimeout(showApiModal, 500);
}

function showApiModal() {
  document.getElementById("apiModal").classList.add("show");
  document.getElementById("apiKeyInput").value = apiKey;
  setTimeout(() => document.getElementById("apiKeyInput").focus(), 300);
}
function hideApiModal() {
  document.getElementById("apiModal").classList.remove("show");
}
function saveApiKey() {
  const val = document.getElementById("apiKeyInput").value.trim();
  if (!val) { showToast("ادخل مفتاح API"); return; }
  apiKey = val;
  localStorage.setItem(KEY_STORAGE, val);
  hideApiModal();
  showToast("✅ تم حفظ المفتاح");
}

function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  document.querySelector(".hdr-btn[onclick*='toggleTheme']").textContent = isLight ? "🌙" : "☀️";
  localStorage.setItem("bp_theme", isLight ? "light" : "dark");
}
function initTheme() {
  if (localStorage.getItem("bp_theme") === "light") {
    document.body.classList.add("light");
    document.querySelector(".hdr-btn[onclick*='toggleTheme']").textContent = "☀️";
  }
}
initTheme();

function addMsg(role, content) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = formatContent(content);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSystem(text) {
  const div = document.createElement("div");
  div.className = "msg system";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function formatContent(text) {
  return text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const trimmed = code.replace(/\n$/, "");
    const langLabel = lang || "code";
    return `<div class="code-header"><span>${langLabel}</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div><pre><code>${escHtml(trimmed)}</code></pre>`;
  }).replace(/`([^`]+)`/g, "<code>$1</code>");
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function copyCode(btn) {
  const pre = btn.closest(".code-header").nextElementSibling;
  const code = pre.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = "✅";
    setTimeout(() => btn.textContent = "نسخ", 1500);
  });
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typingIndicator";
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text || isSending) return;
  if (!apiKey) { showToast("🔑 ادخل مفتاح API أولاً"); showApiModal(); return; }

  input.value = "";
  autoResize(input);
  addMsg("user", text);
  addSystem("جاري الرد...");

  messages.push({ role: "user", content: text });
  saveHistory();
  isSending = true;
  sendBtn.disabled = true;

  try {
    const payload = {
      messages: [
        { role: "system", content: "أنت مساعد ذكي اسمك Big Pickle. ردودك بالعربية دقيقة ومفيدة. تساعد في البرمجة والإجابة على الأسئلة." },
        ...messages.slice(-20)
      ],
      apiKey: apiKey,
      status: "pending",
      timestamp: Date.now()
    };

    const newRef = push(ref(db, "bp_chat"), payload);
    currentRequestKey = newRef.key;

    requestTimeout = setTimeout(() => {
      if (currentListener) {
        currentListener();
        currentListener = null;
      }
      const sysMsgs = chat.querySelectorAll(".msg.system");
      if (sysMsgs.length > 0) sysMsgs[sysMsgs.length - 1].remove();
      addMsg("bot", "⚠️ لم يتم الرد - تأكد من تشغيل bp-chat-relay.py");
      isSending = false;
      sendBtn.disabled = false;
      currentRequestKey = null;
    }, 120000);

    currentListener = onValue(ref(db, "bp_chat/" + currentRequestKey), (snapshot) => {
      const data = snapshot.val();
      if (!data || data.status !== "done") return;

      if (requestTimeout) { clearTimeout(requestTimeout); requestTimeout = null; }

      const sysMsgs = chat.querySelectorAll(".msg.system");
      if (sysMsgs.length > 0) sysMsgs[sysMsgs.length - 1].remove();

      if (data.error) {
        addMsg("bot", "⚠️ " + data.error);
      } else if (data.response) {
        addMsg("bot", data.response);
        messages.push({ role: "assistant", content: data.response });
        saveHistory();
      }

      remove(ref(db, "bp_chat/" + currentRequestKey));
      currentRequestKey = null;
      currentListener = null;
      isSending = false;
      sendBtn.disabled = false;
      input.focus();
    });

  } catch (e) {
    const sysMsgs = chat.querySelectorAll(".msg.system");
    if (sysMsgs.length > 0) sysMsgs[sysMsgs.length - 1].remove();
    addMsg("bot", "⚠️ خطأ: " + e.message);
    isSending = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages.slice(-50)));
  } catch {}
}

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      messages = JSON.parse(saved);
      messages.forEach(m => addMsg(m.role === "user" ? "user" : "bot", m.content));
    }
  } catch {}
}

function clearChat() {
  if (!confirm("تمسح كل المحادثة؟")) return;
  chat.innerHTML = '<div class="msg system">مرحباً بك في Big Pickle 🥒 اسألني عن أي شيء</div>';
  messages = [];
  localStorage.removeItem(STORAGE_KEY);
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}
input.focus();

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(window._tt);
  window._tt = setTimeout(() => toast.classList.remove("show"), 2500);
}

document.getElementById("apiModal").addEventListener("click", function(e) {
  if (e.target === this) hideApiModal();
});
document.getElementById("apiKeyInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") saveApiKey();
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

window.showApiModal = showApiModal;
window.hideApiModal = hideApiModal;
window.saveApiKey = saveApiKey;
window.toggleTheme = toggleTheme;
window.sendMsg = sendMsg;
window.clearChat = clearChat;
window.handleKey = handleKey;
window.autoResize = autoResize;
window.copyCode = copyCode;
</script>
</body>
</html>
